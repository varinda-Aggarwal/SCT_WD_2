<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="page">

    <h1 class="title">🧮 CALCULATOR</h1>

    <div class="main-layout">

      <div class="calculator">
        <div class="toggle-bar">
          <span>🌙</span>
          <label class="switch">
            <input type="checkbox" id="themeToggle" />
            <span class="slider"></span>
          </label>
          <span>☀️</span>
        </div>
        <div class="display">
          <div class="expression" id="expression"></div>
          <div class="result" id="result">0</div>
        </div>
        <div class="buttons">
          <button class="btn special" onclick="clearAll()">AC</button>
          <button class="btn special" onclick="deleteLast()">⌫</button>
          <button class="btn special" onclick="appendValue('%')">%</button>
          <button class="btn operator" onclick="appendValue('/')">÷</button>

          <button class="btn" onclick="appendValue('7')">7</button>
          <button class="btn" onclick="appendValue('8')">8</button>
          <button class="btn" onclick="appendValue('9')">9</button>
          <button class="btn operator" onclick="appendValue('*')">×</button>

          <button class="btn" onclick="appendValue('4')">4</button>
          <button class="btn" onclick="appendValue('5')">5</button>
          <button class="btn" onclick="appendValue('6')">6</button>
          <button class="btn operator" onclick="appendValue('-')">−</button>

          <button class="btn" onclick="appendValue('1')">1</button>
          <button class="btn" onclick="appendValue('2')">2</button>
          <button class="btn" onclick="appendValue('3')">3</button>
          <button class="btn operator" onclick="appendValue('+')">+</button>

          <button class="btn zero" onclick="appendValue('0')">0</button>
          <button class="btn" onclick="appendValue('.')">.</button>
          <button class="btn equals" onclick="calculate()">=</button>
        </div>
      </div>

      <div class="history-box">
        <div class="history-header">
          <span>🕓 History</span>
          <button class="clear-history" onclick="clearHistory()">Clear</button>
        </div>
        <div class="history-list" id="historyList">
          <p class="no-history">No calculations yet!</p>
        </div>
      </div>

    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
